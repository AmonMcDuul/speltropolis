<app-game-container title="🔢 2048">
  <div class="game">
    <div class="topbar">
      <div class="score">⭐ {{ score() }}</div>

      @if (combo() > 1) {
        <div class="combo">🔥 x{{ combo() }}</div>
      }

      <button class="new" (click)="reset()">Nieuw spel</button>
    </div>

    <div class="board" (touchstart)="touchStart($event)" (touchend)="touchEnd($event)">
      @for (row of board(); track $index) {
        <div class="row">
          @for (tile of row; track tile.id) {
            <div class="tile value-{{ tile.value }}" [class.merge]="tile.merged">
              @if (tile.value > 0) {
                {{ tile.value }}
              }
            </div>
          }
        </div>
      }
    </div>
  </div>
</app-game-container>
