<app-game-container title="🧠 Memory">
  <div class="controls">
    <label>
      Kaarten
      <select (change)="setSize($any($event.target).value)">
        <option value="6">6</option>
        <option value="12" selected>12</option>
        <option value="16">16</option>
        <option value="24">24</option>
        <option value="36">36</option>
      </select>
    </label>
    <label>
      Thema
      <select (change)="setTheme($any($event.target).value)">
        @for (theme of themeKeys; track theme) {
          <option [value]="theme">{{ getThemeEmoji(theme) }} {{ theme }}</option>
        }
      </select>
    </label>

    <button (click)="start()">Nieuw spel</button>
  </div>

  <div class="hud">
    <div class="timer">⏱ {{ timer() }} sec</div>

    <div class="stars">
      @for (s of [1, 2, 3]; track s) {
        <span [class.active]="s <= stars()">⭐</span>
      }
    </div>
  </div>

  <div class="grid" [style.--cols]="columns()">
    @for (card of cards(); track card) {
      <div
        class="card"
        [class.flipped]="card.flipped || card.matched"
        [class.matched]="card.matched"
        (click)="flip(card)"
      >
        <div class="card-inner">
          <div class="card-front">❓</div>

          <div class="card-back">
            {{ card.symbol }}
          </div>
        </div>
      </div>
    }
  </div>

  @if (win()) {
    <div class="win">
      <h2>🎉 Goed gedaan!</h2>

      <div class="stars big">
        @for (s of [1, 2, 3]; track s) {
          <span [class.active]="s <= stars()">⭐</span>
        }
      </div>

      <p>Tijd: {{ timer() }} seconden</p>

      <button (click)="start()">Nog een keer</button>
    </div>
  }
</app-game-container>
